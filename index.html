<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MINEPLAY</title>
  <link rel="stylesheet" href="css/hud.css?v=21">
</head>
<body>
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <!-- Crosshair -->
  <div id="crosshair"><div class="ch-dot"></div></div>
  <div id="hitmarker"></div>
  <div id="damage-vignette"></div>

  <!-- Top left -->
  <div id="top-left">
    <div id="coord-display">POS: 0.0 / 0.0</div>
    <div id="fps-display">FPS: --</div>
    <div id="kills-display">KILLS: 0</div>
  </div>

  <!-- Minimap -->
  <div id="minimap">
    ZONE
    <div id="minimap-dot"></div>
  </div>

  <div id="health-bar-wrap">
    <div class="sb-label">HEALTH</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>

  <div id="sprint-bar-wrap">
    <div class="sb-label">STAMINA</div>
    <div id="sprint-bar-bg"><div id="sprint-bar"></div></div>
  </div>

  <div id="ammo-hud">
    <div class="hud-label">Ammo</div>
    <div class="hud-value ammo" id="ammo-val">30<span class="ammo-reserve">/90</span></div>
  </div>

  <div id="weapon-name">AK-74M</div>
  <div id="reload-text">[ RELOADING... ]</div>
</div>

<!-- Lock / Pause screen -->
<div id="lockscreen">
  <h1>MINEPLAY</h1>
  <p>FIRST-PERSON ENGINE — v0.1</p>
  <p style="font-size:9px;opacity:.3" id="ctrl-hint">
    WASD · MOVE &nbsp;|&nbsp; MOUSE · LOOK &nbsp;|&nbsp; SHIFT · SPRINT
    &nbsp;|&nbsp; SPACE · JUMP &nbsp;|&nbsp; C · CROUCH
  </p>
  <button id="start-btn">[ ENTER ZONE ]</button>
</div>

<!-- Mobile hint detection -->
<script>
  if (('ontouchstart' in window) || navigator.maxTouchPoints > 0) {
    const h = document.getElementById('ctrl-hint');
    if (h) h.textContent = 'JOYSTICK · MOVE  |  DRAG RIGHT · LOOK  |  🔫 SHOOT  |  ↑ JUMP  |  ↓ CROUCH  |  ⚡ SPRINT';
  }
</script>

<!-- Three.js (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!--
  Load order matters:
  1. scene.js   — renderer, scene, camera, lights  (globals: renderer, scene, camera)
  2. world.js   — terrain, buildings, trees, rocks (globals: ground, buildings)
  3. player.js  — state, input, physics            (globals: player, keys, yaw, pitch, mouseLocked)
  4. weapon.js  — model, shoot, bob                (globals: weaponGroup, shoot, updateWeaponBob)
  5. game.js    — game loop, resize, start button  (entry point)
-->
<script src="js/scene.js?v=22"></script>
<script src="js/world.js?v=22"></script>
<script src="js/player.js?v=22"></script>
<script src="js/weapon.js?v=22"></script>
<script src="js/game.js?v=22"></script>
<script src="js/mobile.js?v=22"></script>
</body>
</html>
